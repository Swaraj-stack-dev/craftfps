      margin-bottom:10px;

    .grid{

      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));

      padding:20px;
      background:#2b2b2b;

      font-size:18px;
      transition:0.3s;
    }

    .btn:hover{
      background:#55ff55;
      color:black;
      transform:scale(1.05);
    }

    .back{
      display:inline-block;
      margin-bottom:20px;
      background:#55ff55;
      color:black;
      padding:8px 12px;
